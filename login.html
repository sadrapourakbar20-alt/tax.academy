<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ورود | Tax Academy</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700;800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="stylesheet" href="assets/css/style.css">

    <link rel="stylesheet" href="assets/css/responsive.css">

</head>

<body>
<div class="login-page">

    <div class="login-card">

        <div class="login-left">

            <h1>Tax Academy</h1>

            <p>
                به سامانه آموزش مالیات، حسابداری و ثبت شرکت خوش آمدید.
            </p>

            <img src="assets/images/login.svg" alt="Login">
        </div>

        <div class="login-right">

            <h2>ورود به حساب کاربری</h2>

            <form>

                <div class="input-box">

                    <i class="fa-solid fa-user"></i>

                    <input
                        type="text"
                        placeholder="نام کاربری یا ایمیل">

                </div>

                <div class="input-box">

                    <i class="fa-solid fa-lock"></i>

                    <input
                        type="password"
                        placeholder="رمز عبور">

                </div>

                <div class="login-options">

                    <label>

                        <input type="checkbox">

                        مرا به خاطر بسپار

                    </label>

                    <a href="#">

                        فراموشی رمز؟

                    </a>

                </div>

                <button class="btn">

                    ورود

                </button>

            </form>

            <p class="register-link">

                حساب کاربری نداری؟

                <a href="register.html">

                    ثبت نام

                </a>

            </p>

        </div>

    </div>

</div>

<script src="assets/js/app.js"></script>
</body>

</html>
<link rel="stylesheet" href="assets/css/style.css">
<link rel="stylesheet" href="assets/css/login.css">
<link rel="stylesheet" href="assets/css/responsive.css">
